name: "Agent Evaluation"

on:
  workflow_dispatch:
    inputs:
      agent-ids:
        description: "Agent ID (name:version) 例: travel-expense-helpdesk:1"
        required: true
        default: "travel-expense-helpdesk:1"

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Run Evaluation
        uses: microsoft/ai-agent-evals@v3-beta
        with:
          azure-ai-project-endpoint: ${{ vars.AZURE_AI_PROJECT_ENDPOINT }}
          deployment-name: gpt-5.4
          agent-ids: ${{ inputs.agent-ids }}
          data-path: ${{ github.workspace }}/.github/eval-data.json

      - name: Check Pass Rate
        id: check
        shell: bash
        run: |
          # GITHUB_STEP_SUMMARY から Pass Rate を抽出して判定
          SUMMARY="$GITHUB_STEP_SUMMARY"
          if [[ ! -f "$SUMMARY" ]]; then
            echo "No summary file found"
            exit 0
          fi

          # "Pass Rate" カラムから百分率を抽出（例: "50.0%"）
          PASS_RATES=$(grep -oP '\d+\.\d+%' "$SUMMARY" | head -10)
          echo "Pass rates found: $PASS_RATES"

          ALL_PASS=true
          for rate in $PASS_RATES; do
            pct=$(echo "$rate" | tr -d '%')
            if (( $(echo "$pct < 100.0" | bc -l) )); then
              echo "FAIL: $rate < 100%"
              ALL_PASS=false
            fi
          done

          if [[ "$ALL_PASS" == "false" ]]; then
            echo "result=fail" >> "$GITHUB_OUTPUT"
          else
            echo "result=pass" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Issue on Failure
        if: steps.check.outputs.result == 'fail'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync(process.env.GITHUB_STEP_SUMMARY, 'utf8');
            const agentIds = '${{ inputs.agent-ids }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Agent evaluation failed: ${agentIds}`,
              body: [
                `## 評価失敗`,
                ``,
                `| 項目 | 値 |`,
                `|------|-----|`,
                `| Agent | \`${agentIds}\` |`,
                `| Workflow Run | [#${context.runId}](${runUrl}) |`,
                `| Triggered by | @${context.actor} |`,
                ``,
                `### 評価結果`,
                ``,
                summary,
              ].join('\n'),
              labels: ['evaluation']
            });
