name: "Agent Evaluation"

on:
  workflow_dispatch:
    inputs:
      agent-ids:
        description: "Agent ID (name:version) 例: travel-expense-helpdesk:1"
        required: true
        default: "travel-expense-helpdesk:1"

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Run Evaluation
        id: eval
        uses: microsoft/ai-agent-evals@v3-beta
        with:
          azure-ai-project-endpoint: ${{ vars.AZURE_AI_PROJECT_ENDPOINT }}
          deployment-name: gpt-5.4
          agent-ids: ${{ inputs.agent-ids }}
          data-path: ${{ github.workspace }}/.github/eval-data.json

      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const agentIds = '${{ inputs.agent-ids }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Agent evaluation failed: ${agentIds}`,
              body: [
                `## 評価失敗`,
                ``,
                `| 項目 | 値 |`,
                `|------|-----|`,
                `| Agent | \`${agentIds}\` |`,
                `| Workflow Run | [#${context.runId}](${runUrl}) |`,
                `| Triggered by | @${context.actor} |`,
                ``,
                `詳細は [Actions の Summary](${runUrl}) を確認してください。`,
              ].join('\n'),
              labels: ['evaluation']
            });
