name: "Agent Evaluation"

on:
  workflow_dispatch:
    inputs:
      agent-ids:
        description: "Agent ID (name:version) 例: travel-expense-helpdesk:1"
        required: true
        default: "travel-expense-helpdesk:1"

permissions:
  id-token: write
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Run Evaluation
        uses: microsoft/ai-agent-evals@v3-beta
        with:
          azure-ai-project-endpoint: ${{ vars.AZURE_AI_PROJECT_ENDPOINT }}
          deployment-name: gpt-5.4
          agent-ids: ${{ inputs.agent-ids }}
          data-path: ${{ github.workspace }}/.github/eval-data.json
